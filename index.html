<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="weather-input">
            <h2>Enter a city name to get started.</h2>
            <input id="cityInput" type="text" placeholder="Enter City">
            <button id="weatherButton">Get Weather</button>
        </div>
        <div class="weather-output">
            <h3 id="Location">Los Angeles, California</h3>
                <p2 id="Temperature">Current Temperature: 73°F</p2>
                <p2 id="Conditions">Conditions: Cloudy <p2 id="Icon">🌤️</p2></p2>
                <p2 id="Humidity">Humidity: 53%</p2>
                <p2 id="Wind">Wind: 20mph</p2>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
